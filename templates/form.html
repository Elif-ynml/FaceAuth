<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Verileri</title>
</head>
<body>
    <h1>Gönderilen Form Verileri</h1>
    <p><strong>Kullanıcı Adı:</strong> {{ username }}</p>
    <p><strong>Şifre:</strong> {{ password }}</p>
    <p><strong>E-posta:</strong> {{ email }}</p>
    <!-- Yüz verisi için eğer bir alan gönderiliyorsa, isteğe bağlı olarak görüntüleyebilirsiniz -->
    {% if face_data %}
    <p><strong>Yüz Verisi:</strong> <img src="{{ face_data }}" alt="Yüz Verisi"></p>
    {% endif %}
</body>
</html>
