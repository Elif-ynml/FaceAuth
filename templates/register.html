<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kayıt Ol</title>
<link rel="stylesheet" type="text/css" media="screen" href="{{ url_for('static', filename='css/register-style.css') }}">
<script src="{{ url_for('static', filename='js/register-script.js') }}"></script>
</head>
<body>
  
<div class="container">
  <div class="content">
    <h1>Kayıt Ol</h1>
    <form id="register-form" method="post"  action="/form">
      <input type="text" id="username" name="username" placeholder="Kullanıcı Adı" required>
      <input type="password" id="password" name="password" placeholder="Şifre" required>
      <input type="email" id="email" name="email" placeholder="E-posta" required>
      <div class="video-container">
        <video id="video" width="320" height="240"></video>
        <canvas id="canvas" width="320" height="240"></canvas> <!-- Eklenen kısım -->
      </div>
      <input type="hidden" id="faceData" name="faceData"> <!-- Yüz verisini saklamak için gizli bir alan -->
      <button type="button" id="start-camera-btn">Kamerayı Başlat</button><br>
      <button type="submit">Kayıt Ol</button>
      <button id="login-btn">Giriş Yap</button>
    </form>
    <p id="error-message" class="error-message"></p>
    <div id="success-message" class="success-message"></div>
  </div>
</div>

</body>
</html>
